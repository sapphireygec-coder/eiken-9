<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検準1級の語い演習９</title>
<style>
  :root{
    --bg:#12141a;
    --bg-vignette: radial-gradient(circle at 50% 0%, #1b1f28 0%, #0e1015 70%);
    --panel:#1b1e26;
    --panel-edge:#262a34;
    --ink:#e9e6dc;
    --ink-dim:#9a9fab;
    --ink-faint:#5f6472;
    --gold:#c9a24b;
    --gold-soft:#8f7635;
    --gold-glow: rgba(201,162,75,0.35);
    --yellow:#f5c518;
    --lemon:#e8e46a;
    --orange:#e2924f;
    --sapphire:#5b7fd6;
    --teal:#5f97a0;
    --red:#b5654f;
    --green:#7a9d6f;
    --serif-en:'Times New Roman', Times, 'Georgia', serif;
    --serif-jp:'游明朝','Yu Mincho','YuMincho','Hiragino Mincho ProN','HiraMinProN-W3',serif;
    --sans-jp:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    background-image:var(--bg-vignette);
    color:var(--ink);
    font-family:var(--sans-jp);
    min-height:100vh;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 64px;
  }

  /* ---------- Header ---------- */
  header{
    width:100%;
    max-width:640px;
    text-align:center;
    margin-bottom:22px;
  }

  .eyebrow{
    font-family:var(--sans-jp);
    letter-spacing:0.28em;
    font-size:11px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:8px;
  }

  h1{
    font-family:var(--serif-jp);
    font-weight:600;
    font-size:18px;
    margin:0 0 6px;
    color:var(--sapphire);
    letter-spacing:0.02em;
  }

  .sub{
    font-size:12.5px;
    color:var(--ink);
    letter-spacing:0.04em;
  }

  .divider{
    width:64px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--gold-soft), transparent);
    margin:16px auto 0;
  }

  /* ---------- Progress ---------- */
  .progress-row{
    width:100%;
    max-width:640px;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
  }

  .progress-track{
    flex:1;
    height:2px;
    background:var(--panel-edge);
    position:relative;
    border-radius:2px;
    overflow:hidden;
  }

  .progress-fill{
    position:absolute;
    left:0; top:0; bottom:0;
    background:var(--gold);
    transition:width .35s ease;
  }

  .progress-label{
    font-size:12px;
    color:var(--orange);
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }

  /* ---------- Card Stage ---------- */
  .stage{
    width:100%;
    max-width:640px;
    perspective:1800px;
  }

  .card{
    position:relative;
    width:100%;
    transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.3,.1,.2,1);
    cursor:pointer;
  }

  .card.flipped{
    transform:rotateY(180deg);
  }

  .face{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    backface-visibility:hidden;
    border-radius:14px;
    background:linear-gradient(160deg, var(--panel) 0%, #171a21 100%);
    border:1px solid var(--panel-edge);
    box-shadow:0 20px 40px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
    padding:30px 28px 24px;
    display:flex;
    flex-direction:column;
    box-sizing:border-box;
  }

  .face.back{
    transform:rotateY(180deg);
  }

  /* --- top row: number + timer ring --- */
  .face-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:18px;
  }

  .qnum{
    font-family:var(--serif-en);
    font-size:44px;
    font-weight:700;
    color:var(--lemon);
    letter-spacing:0.04em;
    line-height:1;
    text-shadow:0 0 14px rgba(232,228,106,0.35);
  }
  .qnum span{
    color:var(--ink);
    font-size:22px;
    font-weight:400;
    margin-left:5px;
  }

  .timer-block{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    flex-shrink:0;
  }

  .timer-caption{
    font-family:var(--sans-jp);
    font-size:10px;
    color:var(--orange);
    letter-spacing:0.04em;
    white-space:nowrap;
  }

  .timer-ring-wrap{
    position:relative;
    width:60px;
    height:60px;
    flex-shrink:0;
  }

  .timer-ring-wrap svg{
    transform:rotate(-90deg);
  }

  .timer-track{
    fill:none;
    stroke:var(--panel-edge);
    stroke-width:4;
  }

  .timer-arc{
    fill:none;
    stroke:var(--gold);
    stroke-width:4;
    stroke-linecap:round;
    transition:stroke-dashoffset 1s linear, stroke .3s;
  }

  .timer-num{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--serif-en);
    font-size:17px;
    font-weight:700;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
  }

  /* --- front content --- */
  .instruction{
    font-family:var(--sans-jp);
    font-size:12.5px;
    color:var(--orange);
    margin-bottom:14px;
    letter-spacing:0.03em;
  }

  .sentence{
    font-family:var(--serif-en);
    font-size:23px;
    line-height:1.62;
    color:var(--ink);
    margin-bottom:22px;
    flex-grow:0;
  }

  .sentence .blank{
    display:inline-block;
    min-width:64px;
    border-bottom:1.5px solid var(--gold-soft);
    text-align:center;
    color:var(--gold);
  }

  .sentence .speaker{
    color:var(--teal);
    font-weight:bold;
    margin-right:6px;
  }

  .choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px 14px;
    margin-top:auto;
  }

  .choice{
    font-family:var(--serif-en);
    font-size:18px;
    color:var(--ink);
    border:1px solid var(--panel-edge);
    border-radius:8px;
    padding:9px 12px;
    display:flex;
    align-items:baseline;
    gap:8px;
    background:rgba(255,255,255,0.012);
  }

  .choice .num{
    font-size:12px;
    color:var(--orange);
  }

  #choicesFront .choice{
    cursor:pointer;
    transition:border-color .15s, background .15s, color .15s;
  }
  #choicesFront .choice:hover{
    border-color:var(--gold-soft);
    color:var(--ink);
  }
  #choicesFront .choice.picked-correct{
    border-color:var(--green);
    background:rgba(122,157,111,0.12);
    color:var(--ink);
  }
  #choicesFront .choice.picked-wrong{
    border-color:var(--red);
    background:rgba(181,101,79,0.12);
    color:var(--ink);
  }
  #choicesFront .choice.reveal-correct{
    border-color:var(--green);
    color:var(--ink);
  }
  #choicesFront .choice .mark{
    margin-left:auto;
    font-size:13px;
  }
  #choicesFront .choice.picked-correct .mark{ color:var(--green); }
  #choicesFront .choice.picked-wrong .mark{ color:var(--red); }
  #choicesFront .choice.reveal-correct .mark{ color:var(--green); }

  .choices-back{
    margin-top:16px;
    margin-bottom:4px;
  }

  .choice.is-correct{
    border-color:var(--gold-soft);
    color:var(--gold);
    background:rgba(201,162,75,0.08);
  }

  .choice.is-correct .num{
    color:var(--gold);
  }

  .choice .check{
    margin-left:auto;
    color:var(--gold);
    font-size:14px;
  }

  .flip-hint{
    text-align:center;
    font-size:11px;
    color:var(--orange);
    margin-top:18px;
    letter-spacing:0.06em;
  }

  /* --- back content --- */
  .answer-word{
    font-family:var(--serif-en);
    font-size:34px;
    font-weight:700;
    color:var(--gold);
    letter-spacing:0.01em;
    margin-bottom:4px;
  }

  .score-badge{
    font-family:var(--serif-en);
    font-size:15px;
    color:var(--lemon);
    letter-spacing:0.03em;
    margin-bottom:14px;
  }

  .tier-label{
    font-family:var(--serif-en);
    font-size:32px;
    font-weight:700;
    color:var(--gold);
    letter-spacing:0.01em;
    margin-bottom:2px;
  }

  .answer-meaning{
    font-family:var(--serif-jp);
    font-size:17px;
    color:var(--ink);
    margin-bottom:18px;
  }

  .answer-sentence{
    font-family:var(--serif-en);
    font-size:19px;
    line-height:1.6;
    color:var(--ink);
    padding-top:16px;
    border-top:1px solid var(--panel-edge);
    margin-bottom:auto;
  }

  .answer-sentence .speaker{
    color:var(--teal);
    font-weight:bold;
    margin-right:6px;
  }

  .answer-sentence b{
    color:var(--gold);
    font-weight:700;
  }

  .sentence-jp{
    font-family:var(--serif-jp);
    font-size:14.5px;
    line-height:1.8;
    color:var(--lemon);
    margin-top:8px;
    margin-bottom:16px;
  }

  .choice-jp{
    display:block;
    font-family:var(--serif-jp);
    font-size:12px;
    color:var(--lemon);
    margin-top:2px;
    line-height:1.4;
  }

  .choices-back .choice{
    flex-direction:column;
    align-items:stretch;
    gap:0;
  }

  .choice-head{
    display:flex;
    align-items:baseline;
    gap:8px;
    width:100%;
  }

  .choices-back .choice.is-correct .choice-jp{
    color:var(--lemon);
    opacity:0.9;
  }

  .audio-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:18px;
  }

  .audio-btn{
    display:flex;
    align-items:center;
    gap:7px;
    font-family:var(--sans-jp);
    font-size:12px;
    color:var(--ink);
    background:rgba(255,255,255,0.03);
    border:1px solid var(--panel-edge);
    border-radius:20px;
    padding:7px 14px;
    cursor:pointer;
  }

  .audio-btn:hover{ border-color:var(--gold-soft); color:var(--ink); }

  .audio-btn.playing{
    border-color:var(--sapphire);
    color:var(--ink);
  }
  .audio-btn.playing .dot{
    background:var(--sapphire);
    box-shadow:0 0 6px var(--sapphire);
  }

  .audio-btn.pending{
    opacity:0.55;
    border-style:dashed;
  }
  .audio-btn.pending .dot{
    background:var(--orange);
  }

  .audio-btn .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--orange);
  }

  .audio-status{
    font-size:11px;
    color:var(--orange);
  }

  /* ---------- Controls ---------- */
  .controls{
    width:100%;
    max-width:640px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top:22px;
    gap:10px;
  }

  .ctrl-btn{
    font-family:var(--sans-jp);
    font-size:13px;
    color:var(--ink);
    background:var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:9px;
    padding:11px 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:border-color .2s, color .2s;
  }

  .ctrl-btn:hover:not(:disabled){ border-color:var(--gold-soft); color:var(--ink); }
  .ctrl-btn:disabled{ opacity:0.35; cursor:not-allowed; }

  .ctrl-center{
    display:flex;
    gap:8px;
  }

  .icon-btn{
    width:40px;height:40px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--panel);
    border:1px solid var(--panel-edge);
    color:var(--ink);
    cursor:pointer;
  }
  .icon-btn:hover{ border-color:var(--gold-soft); color:var(--gold); }

  .primary-flip{
    background:linear-gradient(160deg,#25292f,#1a1d23);
    border-color:var(--gold-soft);
    color:var(--gold);
  }

  footer{
    margin-top:30px;
    font-size:10.5px;
    color:var(--orange);
    text-align:center;
    letter-spacing:0.05em;
  }

  @media (max-width:420px){
    .sentence{ font-size:20px; }
    .choices{ grid-template-columns:1fr; }
    .answer-word{ font-size:28px; }
    .answer-sentence{ font-size:17px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">EIKEN GRADE PRE-1 &nbsp;·&nbsp; VOCABULARY</div>
  <h1>英検準1級の語い演習９</h1>
  <div class="sub">フラッシュカード形式トレーニング　全18問</div>
  <div class="divider"></div>
</header>

<div class="progress-row">
  <span class="progress-label" id="progressLabel">1 / 18</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="stage">
  <div class="card" id="card">
    <div class="face front">
      <div class="face-top">
        <div class="qnum">Q<span id="qNumFront">01</span><span>/ 18</span></div>
        <div class="timer-block">
          <div class="timer-caption">音声の目安</div>
          <div class="timer-ring-wrap">
            <svg width="60" height="60" viewBox="0 0 60 60">
              <circle class="timer-track" cx="30" cy="30" r="26"></circle>
              <circle class="timer-arc" id="timerArc" cx="30" cy="30" r="26"
                stroke-dasharray="163.4" stroke-dashoffset="0"></circle>
            </svg>
            <div class="timer-num" id="timerNum">20</div>
          </div>
        </div>
      </div>

      <div class="instruction">次の空所に入る最も適切な語を選びなさい</div>
      <div class="sentence" id="sentenceFront"></div>
      <div class="choices" id="choicesFront"></div>
      <div class="flip-hint">タップまたはスペースキーで解答を表示</div>
    </div>

    <div class="face back">
      <div class="face-top">
        <div class="qnum">Q<span id="qNumBack">01</span><span>/ 18</span></div>
        <div class="timer-block" style="visibility:hidden;"><div class="timer-caption">音声の目安</div><div class="timer-ring-wrap"></div></div>
      </div>

      <div class="answer-word" id="answerWord"></div>
      <div class="answer-meaning" id="answerMeaning"></div>
      <div class="answer-sentence" id="answerSentence"></div>
      <div class="sentence-jp" id="sentenceJP"></div>

      <div class="choices choices-back" id="choicesBack"></div>

      <div class="audio-row">
        <button class="audio-btn" id="audioBtn" type="button">
          <span class="dot"></span>
          <span id="audioBtnLabel">音声を再生（選択肢を含む）</span>
        </button>
        <span class="audio-status" id="audioStatus"></span>
      </div>
    </div>
  </div>
</div>

<div class="controls" id="controlsRow">
  <button class="ctrl-btn" id="prevBtn">← 前へ</button>
  <div class="ctrl-center">
    <div class="icon-btn" id="timerToggle" title="タイマー 一時停止 / 再開">⏸</div>
    <div class="icon-btn primary-flip" id="flipBtn" title="カードを裏返す">⟲</div>
  </div>
  <button class="ctrl-btn" id="nextBtn">次へ →</button>
</div>

<div class="stage" id="completionStage" style="display:none;">
  <div class="face" style="position:static; display:flex;">
    <div class="face-top">
      <div class="qnum" style="color:var(--sapphire);">COMPLETE</div>
      <div class="timer-block" style="visibility:hidden;"><div class="timer-caption">音声の目安</div><div class="timer-ring-wrap"></div></div>
    </div>
    <div class="answer-word" style="font-size:20px; color:var(--ink);">Volume 9 — Complete!</div>
    <div class="tier-label" id="tierLabel"></div>
    <div class="score-badge" id="scoreBadge"></div>
    <div class="answer-sentence" id="completionMsg" style="border-top:none; padding-top:0; color:var(--ink); font-size:17px;"></div>
    <div class="audio-row">
      <button class="ctrl-btn" id="restartBtn" type="button">↺ Restart this set</button>
    </div>
  </div>
</div>

<footer>20秒タイマーは音声の再生時間の目安として設定しています</footer>

<audio id="player" preload="none"></audio>

<script>
const DATA = [
  {
    num:1,
    audioFile:'eiken-jun1-9.mp3', audioStart:0.1, audioEnd:13.0,
    sentence:'<span class="speaker">A:</span>Mom, can you make hamburgers for dinner tonight?<br><span class="speaker">B:</span>Yes, but I’ll have to take the meat out of the freezer and let it ( &nbsp;&nbsp;&nbsp; ) first.',
    choices:['reckon', 'thaw', 'stray', 'shatter'],
    correct:1,
    meaning:'解凍する、溶ける',
    fullSentence:'A: Mom, can you make hamburgers for dinner tonight?<br>B: Yes, but I’ll have to take the meat out of the freezer and let it <b>thaw</b> first.',
    sentenceJP:'A：お母さん、今夜の夕食にハンバーガーを作ってくれる？<br>B：いいけど、まず冷凍庫からお肉を出して解凍させないといけないわね。',
    choicesJP:['思う、見積もる', '解凍する、溶ける', 'はぐれる、迷い出る', '粉々に砕く'],
  },
  {
    num:2,
    audioFile:'eiken-jun1-9.mp3', audioStart:13.0, audioEnd:25.6,
    sentence:'Jocelyn always reminded her son not to tell lies. She believed it was important to ( &nbsp;&nbsp;&nbsp; ) a strong sense of honesty in him.',
    choices:['remodel', 'stumble', 'overlap', 'instill'],
    correct:3,
    meaning:'（思想などを）徐々に教え込む、植え付ける',
    fullSentence:'Jocelyn believed it was important to <b>instill</b> a strong sense of honesty in her son.',
    sentenceJP:'ジョセリンはいつも息子に嘘をつかないよう言い聞かせていた。彼女は、息子に強い誠実さを植え付けることが大切だと考えていた。',
    choicesJP:['改造する', 'つまずく', '重なる', '（思想などを）徐々に教え込む、植え付ける'],
  },
  {
    num:3,
    audioFile:'eiken-jun1-9.mp3', audioStart:25.6, audioEnd:38.8,
    sentence:'Zara was very angry with her boyfriend, but she forgave him after hearing his ( &nbsp;&nbsp;&nbsp; ) apology. She was sure that he really was sorry.',
    choices:['detectable', 'earnest', 'cumulative', 'underlying'],
    correct:1,
    meaning:'真剣な、誠実な',
    fullSentence:'Zara was very angry with her boyfriend, but she forgave him after hearing his <b>earnest</b> apology.',
    sentenceJP:'ザラはボーイフレンドにとても腹を立てていたが、彼の真剣な謝罪を聞いて許した。彼女は、彼が本当に申し訳なく思っていると確信した。',
    choicesJP:['検出可能な', '真剣な、誠実な', '累積的な', '根底にある'],
  },
  {
    num:4,
    audioFile:'eiken-jun1-9.mp3', audioStart:38.8, audioEnd:51.8,
    sentence:'At first, the Smiths enjoyed their backyard swimming pool, but keeping it clean became such a ( &nbsp;&nbsp;&nbsp; ) that they left it covered most of the time.',
    choices:['bureau', 'nuisance', 'sequel', 'metaphor'],
    correct:1,
    meaning:'迷惑、厄介なもの',
    fullSentence:'Keeping the pool clean became such a <b>nuisance</b> that the Smiths left it covered most of the time.',
    sentenceJP:'最初、スミス家は裏庭のプールを楽しんでいたが、それを清潔に保つことがあまりに厄介になったため、ほとんどの時間カバーをかけたままにしていた。',
    choicesJP:['事務局、局', '迷惑、厄介なもの', '続編', '比喩'],
  },
  {
    num:5,
    audioFile:'eiken-jun1-9.mp3', audioStart:51.8, audioEnd:64.6,
    sentence:'Throughout the course of history, many great thinkers were at first ( &nbsp;&nbsp;&nbsp; ) for their ideas before eventually being taken seriously.',
    choices:['saturated', 'flattered', 'ingested', 'ridiculed'],
    correct:3,
    meaning:'あざ笑われた、嘲笑された',
    fullSentence:'Throughout history, many great thinkers were at first <b>ridiculed</b> for their ideas before eventually being taken seriously.',
    sentenceJP:'歴史を通じて、多くの偉大な思想家たちは、最終的に真剣に受け止められる前に、最初はその考えを嘲笑されていた。',
    choicesJP:['飽和した', 'お世辞を言われた', '摂取された', 'あざ笑われた、嘲笑された'],
  },
  {
    num:6,
    audioFile:'eiken-jun1-9.mp3', audioStart:64.6, audioEnd:78.4,
    sentence:'At first, the little girl felt ( &nbsp;&nbsp;&nbsp; ) in front of the large audience at the speech contest, but after about a minute she began to feel more confident.',
    choices:['mortal', 'bashful', 'pious', 'concise'],
    correct:1,
    meaning:'恥ずかしがりの、内気な',
    fullSentence:'At first, the little girl felt <b>bashful</b> in front of the large audience, but after about a minute she began to feel more confident.',
    sentenceJP:'最初、その少女はスピーチコンテストの大勢の聴衆を前に恥ずかしがっていたが、1分ほどすると次第に自信を持てるようになった。',
    choicesJP:['死すべき運命の', '恥ずかしがりの、内気な', '敬虔な', '簡潔な'],
  },
  {

const TOTAL = DATA.length;
let idx = 0;
let flipped = false;
const TIMER_SECONDS = 20;
let timerVal = TIMER_SECONDS;
let timerInterval = null;
let timerRunning = true;
const RADIUS = 26;
const CIRC = 2 * Math.PI * RADIUS;
const userAnswers = new Array(TOTAL).fill(null); // records which choice index the user tapped, per question

const cardEl = document.getElementById('card');
const sentenceFront = document.getElementById('sentenceFront');
const choicesFront = document.getElementById('choicesFront');
const choicesBack = document.getElementById('choicesBack');
const qNumFront = document.getElementById('qNumFront');
const qNumBack = document.getElementById('qNumBack');
const answerWord = document.getElementById('answerWord');
const answerMeaning = document.getElementById('answerMeaning');
const answerSentence = document.getElementById('answerSentence');
const sentenceJPEl = document.getElementById('sentenceJP');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const timerArc = document.getElementById('timerArc');
const timerNum = document.getElementById('timerNum');
const timerToggle = document.getElementById('timerToggle');
const audioBtn = document.getElementById('audioBtn');
const audioBtnLabel = document.getElementById('audioBtnLabel');
const audioStatus = document.getElementById('audioStatus');
const player = document.getElementById('player');

function pad(n){ return n.toString().padStart(2,'0'); }

const CHOICE_LETTERS = ['(1)','(2)','(3)','(4)'];

function renderChoicesFront(item){
  const picked = userAnswers[idx];
  choicesFront.innerHTML = item.choices.map((c,i)=>{
    let cls = '';
    let mark = '';
    if(picked !== null){
      if(i === picked && i === item.correct){ cls = ' picked-correct'; mark = '<span class="mark">✓</span>'; }
      else if(i === picked && i !== item.correct){ cls = ' picked-wrong'; mark = '<span class="mark">✗</span>'; }
      else if(i === item.correct){ cls = ' reveal-correct'; mark = '<span class="mark">✓</span>'; }
    }
    return `<div class="choice${cls}" data-i="${i}"><span class="num">${CHOICE_LETTERS[i]}</span>${c}${mark}</div>`;
  }).join('');

  choicesFront.querySelectorAll('.choice').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      selectAnswer(parseInt(el.dataset.i, 10));
    });
  });
}

function selectAnswer(choiceIndex){
  if(userAnswers[idx] !== null) return; // already answered this question
  userAnswers[idx] = choiceIndex;
  renderChoicesFront(DATA[idx]);
}

function renderCard(){
  const item = DATA[idx];
  flipped = false;
  cardEl.classList.remove('flipped');

  qNumFront.textContent = pad(item.num);
  qNumBack.textContent = pad(item.num);
  sentenceFront.innerHTML = item.sentence;

  const letters = ['(1)','(2)','(3)','(4)'];
  renderChoicesFront(item);
  choicesBack.innerHTML = item.choices.map((c,i)=>
    `<div class="choice${i===item.correct?' is-correct':''}">
       <div class="choice-head"><span class="num">${letters[i]}</span>${c}${i===item.correct?'<span class="check">✓</span>':''}</div>
       <span class="choice-jp">${item.choicesJP[i]}</span>
     </div>`
  ).join('');

  answerWord.textContent = item.choices[item.correct];
  answerMeaning.textContent = item.meaning;
  answerSentence.innerHTML = item.fullSentence;
  sentenceJPEl.innerHTML = item.sentenceJP.replace(/\n/g, '<br>');

  progressLabel.textContent = `${idx+1} / ${TOTAL}`;
  progressFill.style.width = `${((idx+1)/TOTAL)*100}%`;

  document.getElementById('prevBtn').disabled = idx === 0;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = idx === TOTAL - 1 ? 'Finish ✓' : '次へ →';
  nextBtn.disabled = false;

  audioStatus.textContent = '';
  player.pause();
  audioBtn.classList.remove('playing');
  audioBtn.classList.toggle('pending', !item.audioFile);
  audioBtnLabel.textContent = item.audioFile ? '音声を再生' : '音声（後日追加予定）';
  resetTimer();

  // let the DOM update with new text, then size the card to fit whichever
  // face (front or back) needs more room, so nothing gets cut off or hidden
  requestAnimationFrame(syncCardHeight);
}

const faceFront = document.querySelector('.face.front');
const faceBack = document.querySelector('.face.back');

function syncCardHeight(){
  const h = Math.max(faceFront.scrollHeight, faceBack.scrollHeight);
  cardEl.style.height = h + 'px';
}

window.addEventListener('resize', ()=> requestAnimationFrame(syncCardHeight));

function resetTimer(){
  clearInterval(timerInterval);
  timerVal = TIMER_SECONDS;
  updateTimerDisplay();
  timerRunning = true;
  timerToggle.textContent = '⏸';
  timerInterval = setInterval(tick, 1000);
}

function tick(){
  if(!timerRunning) return;
  timerVal -= 1;
  if(timerVal <= 0){
    timerVal = 0;
    updateTimerDisplay();
    clearInterval(timerInterval);
    return;
  }
  updateTimerDisplay();
}

function updateTimerDisplay(){
  timerNum.textContent = timerVal;
  const offset = CIRC * (1 - timerVal/TIMER_SECONDS);
  timerArc.style.strokeDasharray = CIRC;
  timerArc.style.strokeDashoffset = offset;
  timerArc.style.stroke = timerVal <= 5 ? 'var(--red)' : 'var(--gold)';
}

function flipCard(){
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function goNext(){
  if(idx < TOTAL - 1){
    idx++;
    renderCard();
  } else {
    showCompletion();
  }
}
function goPrev(){
  if(idx > 0){ idx--; renderCard(); }
}

const SCORE_TIERS = [
  { min:18, label:'Perfect Score! 🏆', messages:[

  ]},
  { min:16, label:'Excellent!', messages:[
    "A strong, near-perfect score. You clearly know this material \u2014 just a word or two to tighten up. Volume 10 is exactly where the real progress happens.",
    "Excellent work. That's the kind of score that gets people through Eiken Pre-1. Keep the streak alive \u2014 Volume 10 is waiting."
  ]},
  { min:13, label:'Great Job!', messages:[

  ]},
  { min:0, label:'Keep Going!', messages:[
    "This set had some tricky words. That's completely normal \u2014 the fix is simple: run through it again before moving on, and it'll click.",
    "Don't worry about the score \u2014 this is genuinely advanced vocabulary. Try flipping through Volume 9 once more; repetition is what makes these words stick."
  ]},
];

function getScoreTier(score){
  return SCORE_TIERS.find(t => score >= t.min);
}

function showCompletion(){
  clearInterval(timerInterval);
  document.querySelector('.stage:not(#completionStage)').style.display = 'none';
  document.getElementById('controlsRow').style.display = 'none';
  document.getElementById('completionStage').style.display = 'block';

  const score = userAnswers.reduce((sum, ans, i) => sum + (ans === DATA[i].correct ? 1 : 0), 0);
  const tier = getScoreTier(score);
  const msg = tier.messages[Math.floor(Math.random() * tier.messages.length)];

  document.getElementById('tierLabel').textContent = tier.label;
  document.getElementById('scoreBadge').textContent = `Your score: ${score} / ${TOTAL}`;
  document.getElementById('completionMsg').textContent = msg;

  progressLabel.textContent = `${TOTAL} / ${TOTAL}`;
  progressFill.style.width = '100%';
}

function restartSet(){
  idx = 0;
  userAnswers.fill(null);
  document.getElementById('completionStage').style.display = 'none';
  document.querySelector('.stage:not(#completionStage)').style.display = 'block';
  document.getElementById('controlsRow').style.display = 'flex';
  renderCard();
}

cardEl.addEventListener('click', flipCard);
document.getElementById('flipBtn').addEventListener('click', (e)=>{ e.stopPropagation(); flipCard(); });
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('prevBtn').addEventListener('click', goPrev);
document.getElementById('restartBtn').addEventListener('click', restartSet);

timerToggle.addEventListener('click', (e)=>{
  e.stopPropagation();
  timerRunning = !timerRunning;
  timerToggle.textContent = timerRunning ? '⏸' : '▶';
});

document.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){ e.preventDefault(); flipCard(); }
  if(e.code === 'ArrowRight'){ goNext(); }
  if(e.code === 'ArrowLeft'){ goPrev(); }
});

let currentClipEnd = null;
let loadedFile = null;

function stopClip(){
  player.pause();
  currentClipEnd = null;
  audioBtn.classList.remove('playing');
  audioBtnLabel.textContent = '音声を再生';
  audioStatus.textContent = '';
}

audioBtn.addEventListener('click', (e)=>{
  e.stopPropagation();

  const item = DATA[idx];

  if(!item.audioFile){
    audioStatus.textContent = '音声は後日追加予定です';
    return;
  }

  // toggle: if this clip is already playing, pressing again pauses it
  if(!player.paused){
    stopClip();
    return;
  }

  currentClipEnd = item.audioEnd;
  const needsLoad = loadedFile !== item.audioFile;

  audioBtnLabel.textContent = '再生中…';
  audioStatus.textContent = '';
  audioBtn.classList.add('playing');

  if(needsLoad){
    loadedFile = item.audioFile;
    player.src = `audio/${item.audioFile}`;
    player.muted = true; // play silently until we can seek to the exact start point

    const unmute = () => { player.muted = false; };

    player.addEventListener('loadedmetadata', function onMeta(){
      player.currentTime = item.audioStart;
      // if we're seeking to the position the player is already at (e.g. start
      // time is exactly 0), the 'seeked' event never fires, so unmute right away
      if(Math.abs(player.currentTime - item.audioStart) < 0.05){
        unmute();
      }
    }, { once:true });
    player.addEventListener('seeked', function onSeek(){
      unmute();
    }, { once:true });
    // safety net: guarantee we're never stuck muted even if the above events
    // don't fire as expected on a given browser
    setTimeout(unmute, 600);
    player.addEventListener('error', function onErr(){
      audioStatus.textContent = '音声ファイルが見つかりません（パスをご確認ください）';
      audioBtnLabel.textContent = '音声を再生';
      audioBtn.classList.remove('playing');
    }, { once:true });
  } else {
    player.currentTime = item.audioStart;
  }

  // play() is called synchronously, in direct response to the tap/click,
  // which is required for playback to be allowed on iPhone/Safari and most mobile browsers.
  const playPromise = player.play();
  if(playPromise && playPromise.catch){
    playPromise.catch(()=>{
      audioBtnLabel.textContent = '音声を再生';
      audioBtn.classList.remove('playing');
      audioStatus.textContent = 'もう一度タップして再生してください';
      player.muted = false;
    });
  }
});

// stop exactly at the end of this question's clip
player.addEventListener('timeupdate', ()=>{
  if(currentClipEnd !== null && player.currentTime >= currentClipEnd){
    stopClip();
  }
});
player.addEventListener('ended', stopClip);

renderCard();
